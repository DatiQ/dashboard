<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>INDUSTRIAL DASHBOARD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect x='2' y='2' width='9' height='9' fill='%230ea5e9' /%3E%3Crect x='13' y='2' width='9' height='9' fill='%2322c55e' /%3E%3Crect x='2' y='13' width='9' height='9' fill='%23eab308' /%3E%3Crect x='13' y='13' width='9' height='9' fill='%2364748b' /%3E%3C/svg%3E">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>

  <style>
    @property --progress {
      syntax: '<percentage>';
      inherits: true;
      initial-value: 0%;
    }

    :root {
      --bg-color: #080b10;
      --card-bg: #111722;
      --card-bg-active: #151d2a;
      --panel-bg: #0b1018;
      --line: #253142;
      --text-main: #f8fafc;
      --text-muted: #7b8798;

      --clr-q2: #38bdf8;
      --clr-u1: #fbbf24;
      --clr-p1s: #4ade80;
      --clr-offline: #64748b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 20px;
      color: var(--text-main);
      font-family: 'Rajdhani', sans-serif;
      font-weight: 500;
      background: var(--bg-color);
    }

    .dashboard {
      width: 100%;
      max-width: 1140px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .card {
      --status-clr: var(--clr-offline);
      --printer-clr: var(--clr-offline);
      position: relative;
      min-height: 238px;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
      padding: 18px 20px 21px 28px;
      border-radius: 8px;
      background: var(--card-bg);
      border: none;
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
      transition:
        transform 0.2s ease,
        background-color 0.25s ease,
        --progress 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card::before {
      content: "";
      position: absolute;
      left: 10px;
      top: 16px;
      bottom: 16px;
      width: 6px;
      border-radius: 3px;
      background: #222c3a;
    }

    .card::after {
      content: "";
      position: absolute;
      left: 10px;
      bottom: 16px;
      width: 6px;
      height: var(--progress, 0%);
      max-height: calc(100% - 32px);
      border-radius: 3px;
      background: var(--printer-clr);
      opacity: 0;
      transition:
        height 0.8s cubic-bezier(0.4, 0, 0.2, 1),
        opacity 0.25s ease;
    }

    .card.p-printing {
      transform: translateY(-2px);
      background: var(--card-bg-active);
    }

    .card.p-printing::after {
      opacity: 1;
    }

    #card_q2 { --printer-clr: var(--clr-q2); }
    #card_u1 { --printer-clr: var(--clr-u1); }
    #card_p1s { --printer-clr: var(--clr-p1s); }

    .card.p-offline { --status-clr: var(--clr-offline); }
    .card.p-printing, .card.p-ready, .card.p-paused { --status-clr: var(--printer-clr); }

    .card-header,
    #content_q2,
    #content_u1,
    #content_p1s {
      position: relative;
      z-index: 1;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      min-height: 30px;
    }

    .printer-title {
      color: var(--printer-clr);
      font-size: 21px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    .card.p-offline .printer-title {
      color: var(--text-muted);
    }

    .status-wrapper {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 5px 10px;
      border-radius: 6px;
      color: var(--status-clr);
      background: var(--panel-bg);
      border: none;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 2px;
      background: var(--status-clr);
    }

    #content_q2,
    #content_u1,
    #content_p1s {
      display: grid;
      grid-template-rows: 1fr auto;
      min-height: 0;
    }

    .print-text-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }

    .print-percentage {
      color: var(--text-main);
      font-size: 52px;
      font-weight: 700;
      line-height: 0.9;
      letter-spacing: -1.6px;
    }

    .print-label {
      margin-top: 7px;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.4px;
      text-transform: uppercase;
    }

    .idle-box {
      grid-row: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .idle-circle {
      width: 64px;
      height: 64px;
      display: grid;
      place-items: center;
      margin-bottom: 14px;
      color: var(--status-clr);
      border-radius: 6px;
      background: var(--panel-bg);
      border: 1px solid color-mix(in srgb, var(--status-clr) 36%, var(--line));
    }

    .card.p-ready .idle-circle,
    .card.p-paused .idle-circle {
      animation: breathe 2.5s infinite ease-in-out;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.035); }
    }

    .idle-icon {
      width: 30px;
      height: 30px;
      fill: currentColor;
    }

    .idle-title {
      color: var(--text-main);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .card.p-offline .idle-title {
      color: var(--text-muted);
    }

    .idle-subtitle {
      margin-top: 3px;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      align-self: end;
      overflow: hidden;
      border-radius: 6px;
      background: var(--panel-bg);
      border: 1px solid rgba(255,255,255,0.05);
    }

    .metric-item {
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 10px 8px;
    }

    .metric-item + .metric-item {
      border-left: 1px solid rgba(255,255,255,0.07);
    }

    .metric-label {
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .metric-value {
      color: var(--text-main);
      font-size: 18px;
      font-weight: 700;
      line-height: 1;
    }

    @media (min-width: 961px) {
      body { justify-content: center; }
    }

    @media (max-width: 960px) {
      body { padding: 18px 14px; }
      .dashboard { grid-template-columns: 1fr; gap: 14px; }
      .card { min-height: 232px; }
    }

    body.device-surface {
      padding: 42px 24px;
    }

    body.device-surface .dashboard {
      max-width: 1250px;
      gap: 20px;
    }

    body.device-surface .card {
      min-height: 268px;
      padding: 22px 24px 22px 34px;
      border-radius: 8px;
    }

    body.device-surface .card::before,
    body.device-surface .card::after {
      left: 13px;
      width: 7px;
    }

    body.device-surface .printer-title { font-size: 24px; }
    body.device-surface .status-wrapper { font-size: 14px; padding: 6px 12px; }
    body.device-surface .print-percentage { font-size: 60px; }
    body.device-surface .print-label { font-size: 14px; }
    body.device-surface .idle-circle { width: 74px; height: 74px; }
    body.device-surface .idle-icon { width: 35px; height: 35px; }
    body.device-surface .idle-title { font-size: 21px; }
    body.device-surface .idle-subtitle { font-size: 15px; }
    body.device-surface .metric-label { font-size: 14px; }
    body.device-surface .metric-value { font-size: 21px; }
  </style>
</head>
<body>

  <div class="dashboard">
    <div id="card_q2" class="card p-offline">
      <div class="card-header">
        <div class="printer-title">QIDI Q2</div>
        <div class="status-wrapper"><div class="status-dot"></div><span id="state_q2">Offline</span></div>
      </div>
      <div id="content_q2"></div>
    </div>

    <div id="card_u1" class="card p-offline">
      <div class="card-header">
        <div class="printer-title">Snapmaker U1</div>
        <div class="status-wrapper"><div class="status-dot"></div><span id="state_u1">Offline</span></div>
      </div>
      <div id="content_u1"></div>
    </div>

    <div id="card_p1s" class="card p-offline">
      <div class="card-header">
        <div class="printer-title">Bambu Lab P1S</div>
        <div class="status-wrapper"><div class="status-dot"></div><span id="state_p1s">Offline</span></div>
      </div>
      <div id="content_p1s"></div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const isWindows = /Win/i.test(navigator.platform) || /Windows/i.test(navigator.userAgent);
      const screenRatio = window.screen.width / window.screen.height;
      const isAspectRatio32 = Math.abs(screenRatio - 1.5) < 0.05;
      const isHighDPI = window.devicePixelRatio >= 1.5;

      if (isWindows && isAspectRatio32 && isHighDPI) {
        document.body.classList.add('device-surface');
        console.log("[Surface] 3:2 screen styles enabled.");
      }
    });

    const cloudBroker = 'm0722111.ala.eu-central-1.emqxsl.com';
    const cloudPort = 8084; 
    const cloudUser = 'DatiX';   
    const cloudPass = 'fdfkjy';  
    const cloudTopic = 'my_printers/data';

    const clientId = 'web_dashboard_' + Math.random().toString(16).substr(2, 8);
    const mqtt = new Paho.MQTT.Client(cloudBroker, cloudPort, clientId);

    mqtt.onConnectionLost = () => { setTimeout(connectMQTT, 2000); };

    mqtt.onMessageArrived = (message) => {
      try {
        const data = JSON.parse(message.payloadString);
        
        Object.keys(data).forEach(id => {
          const p = data[id];
          const card = document.getElementById('card_' + id);
          const stateEl = document.getElementById('state_' + id);
          if (!card || !stateEl) return;

          stateEl.innerText = p.state === 'READY' ? 'STANDBY' : p.state;
          card.className = 'card ' + (p.state === 'PRINTING' ? 'p-printing' : (p.state === 'PAUSED' ? 'p-paused' : (p.state === 'READY' ? 'p-ready' : 'p-offline')));

          let html = '';
          if (p.online && p.state === 'PRINTING') {
            let fTime = '--:--';
            if (p.remSec > 0) {
              let d = new Date(Date.now() + p.remSec * 1000);
              fTime = d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
            }
            
            card.style.setProperty('--progress', p.progress + '%');

            html = `
              <div class="print-text-box">
                <div class="print-percentage">${p.progress}%</div>
                <div class="print-label">Printing Process</div>
              </div>
              <div class="metrics-grid">
                <div class="metric-item"><div class="metric-label">Remaining</div><div class="metric-value">${p.remaining}</div></div>
                <div class="metric-item"><div class="metric-label">Estimated</div><div class="metric-value">${fTime}</div></div>
                <div class="metric-item"><div class="metric-label">Layer</div><div class="metric-value">${p.layer}</div></div>
              </div>`;
          } else {
            card.style.setProperty('--progress', '0%');

            if (!p.online) {
              html = `
                <div class="idle-box">
                  <div class="idle-circle">
                    <svg class="idle-icon" viewBox="0 0 24 24">
                      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                    </svg>
                  </div>
                  <div class="idle-title">No Connection</div>
                  <div class="idle-subtitle">Check power or network</div>
                </div>`;
            } else if (p.state === 'PAUSED') {
              html = `
                <div class="idle-box">
                  <div class="idle-circle">
                    <svg class="idle-icon" viewBox="0 0 24 24">
                      <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                    </svg>
                  </div>
                  <div class="idle-title">Print Paused</div>
                  <div class="idle-subtitle">Waiting to resume</div>
                </div>`;
            } else {
              html = `
                <div class="idle-box">
                  <div class="idle-circle">
                    <svg class="idle-icon" viewBox="0 0 24 24">
                      <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                    </svg>
                  </div>
                  <div class="idle-title">Standby Mode</div>
                  <div class="idle-subtitle">Ready to print</div>
                </div>`;
            }
          }
          
          document.getElementById('content_' + id).innerHTML = html;
          
          const baseOrder = id === 'q2' ? 1 : (id === 'u1' ? 2 : 3);
          card.style.order = (p.online && p.state === 'PRINTING') ? baseOrder : (baseOrder + 3);
        });
      } catch (e) { console.error(e); }
    };

    function connectMQTT() {
      mqtt.connect({
        useSSL: true, 
        userName: cloudUser,
        password: cloudPass,
        onSuccess: () => { mqtt.subscribe(cloudTopic); },
        onFailure: () => { setTimeout(connectMQTT, 2000); }
      });
    }

    connectMQTT();
  </script>
</body>
</html>
