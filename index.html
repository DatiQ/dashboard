<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>DASHBOARD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect x='2' y='2' width='9' height='9' fill='%230ea5e9' /%3E%3Crect x='13' y='2' width='9' height='9' fill='%2322c55e' /%3E%3Crect x='2' y='13' width='9' height='9' fill='%23eab308' /%3E%3Crect x='13' y='13' width='9' height='9' fill='%2364748b' /%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
  <style>
    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      margin: 0;
      padding: 24px;
      background: #060607;
      color: #e8eaed;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }
    .dashboard {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    .card {
      width: 300px;
      background: #121214;
      padding: 15px;
      border-radius: 12px;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card-main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 4px 80px;
      gap: 12px;
      align-items: stretch;
    }

    .card-col-pct {
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-self: stretch;
    }

    .card-col-pct .card-title {
      margin-top: auto;
      padding-top: 8px;
    }

    .card-rail {
      width: 4px;
      align-self: stretch;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .card-rail-track {
      flex: 1;
      width: 100%;
      min-height: 60px;
      background: #08080a;
      border-radius: 2px;
      position: relative;
      overflow: hidden;
    }

    .card-rail-fill {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: calc(100% * var(--progress-num, 0) / 100);
      max-height: 100%;
      min-height: 0;
      background: var(--printer-clr, #64748b);
      border-radius: 2px;
      transition: height 0.6s ease;
    }

    .card-rail-fill.is-full {
      height: 100%;
    }

    .card-col-params {
      min-width: 0;
    }

    .card-params {
      margin: 0;
    }

    .card-params dt {
      margin: 0 0 0px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.35px;
      color: #64748b;
    }

    .card-params dd {
      margin: 0 0 12px;
      font-size: 14px;
      font-weight: 600;
    }

    .card-params dd:last-of-type {
      margin-bottom: 0;
    }

    .card-params dd.is-placeholder {
      color: #64748b;
      opacity: 0.65;
    }

    .card-title {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.2;
      text-align: left;
      text-transform: uppercase;
      color: var(--title-clr, var(--printer-clr, #e8eaed));
    }

    .card[data-id="q2"] { --printer-clr: #00d2ff; }
    .card[data-id="u1"] { --printer-clr: #f0c028; }
    .card[data-id="p1s"] { --printer-clr: #10b981; }

    .card.p-offline {
      --state-clr: #94a3b8;
      --printer-clr: #94a3b8;
      --state-bg: rgba(148, 163, 184, 0.12);
      background: #101012;
    }

    .card.p-offline .card-rail-track {
      background: rgba(148, 163, 184, 0.18);
    }

    .card.p-ready {
      --state-clr: #a78bfa;
      --state-bg: rgba(167, 139, 250, 0.14);
      background: #14121a;
    }

    .card.p-paused {
      --state-clr: #fb923c;
      --state-bg: rgba(251, 146, 60, 0.14);
      --title-clr: var(--state-clr);
      background: #16130f;
    }

    .card.p-ready .card-rail-track {
      background: rgba(167, 139, 250, 0.2);
    }

    .card.p-paused .card-rail-track {
      background: rgba(251, 146, 60, 0.2);
    }

    .card-state-standby,
    .card-state-paused,
    .card-state-offline {
      display: none;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
      align-self: flex-start;
      width: 100%;
      gap: 0;
    }

    .card.p-ready .card-state-standby {
      display: flex;
    }

    .card.p-paused .card-state-paused {
      display: flex;
    }

    .card.p-offline .card-state-offline {
      display: flex;
    }

    .card.p-ready .card-pct-inner,
    .card.p-paused .card-pct-inner,
    .card.p-offline .card-pct-inner {
      display: none;
    }

    .card-state-circle {
      width: 56px;
      height: 56px;
      border-radius: 10px;
      border: 3px solid var(--state-clr);
      background: rgba(0, 0, 0, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--state-clr);
      flex-shrink: 0;
    }

    .card-state-icon {
      width: 28px;
      height: 28px;
      fill: currentColor;
      flex-shrink: 0;
    }

    .card.p-ready .card-state-circle,
    .card.p-paused .card-state-circle,
    .card.p-offline .card-state-circle {
      width: 143px;
      height: 108px;
      flex-direction: column;
      gap: 6px;
      padding: 12px 10px;
      box-sizing: border-box;
    }

    .card.p-ready .card-state-icon,
    .card.p-paused .card-state-icon,
    .card.p-offline .card-state-icon {
      width: 32px;
      height: 32px;
    }

    .card.p-offline .card-state-circle {
      border-color: var(--state-clr);
      background: rgba(0, 0, 0, 0.35);
      opacity: 0.92;
    }

    .card.p-offline .card-state-label {
      color: var(--state-clr);
      letter-spacing: 0.14em;
    }

    .card-state-label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.12em;
      line-height: 1;
      text-align: center;
    }

    .card-pct-paused {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 3px;
      line-height: 1;
      color: var(--state-clr);
    }

    .card-pct-paused-num {
      font-size: 14px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .card-pct-paused-sym {
      font-size: 10px;
      font-weight: 700;
    }

    .printer-name {
      display: none;
    }

    .card-pct {
      margin: 0;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }

    .card.p-ready .card-pct,
    .card.p-paused .card-pct,
    .card.p-printing .card-pct,
    .card.p-offline .card-pct {
      align-items: flex-start;
      justify-content: flex-start;
    }

    .card-pct-inner {
      position: relative;
      display: inline-block;
      line-height: 0.9;
      align-self: flex-start;
    }

    .card-num {
      font-size: 80px;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 0.9;
    }

    .card-sym {
      position: absolute;
      left: 100%;
      top: 0;
      margin-left: 2px;
      margin-top: 3px;
      font-size: 32px;
      font-weight: 700;
      line-height: 1;
    }

    /* Surface (3:2, Windows, HiDPI) — +15% */
    body.device-surface {
      padding: 28px;
    }

    body.device-surface .dashboard {
      gap: 28px;
    }

    body.device-surface .card {
      width: 330px;
      padding: 17px;
      border-radius: 14px;
      gap: 14px;
    }

    body.device-surface .card-main {
      grid-template-columns: minmax(0, 1fr) 5px 92px;
      gap: 14px;
    }

    body.device-surface .card-rail {
      width: 5px;
    }

    body.device-surface .card-rail-track {
      min-height: 69px;
    }

    body.device-surface .card-params dt {
      font-size: 12px;
    }

    body.device-surface .card-params dd {
      font-size: 16px;
      margin-bottom: 14px;
    }

    body.device-surface .card-params dd:last-of-type {
      margin-bottom: 0;
    }

    body.device-surface .card-col-pct .card-title {
      font-size: 16px;
      padding-top: 9px;
    }

    body.device-surface .card-state-circle {
      width: 64px;
      height: 64px;
    }

    body.device-surface .card.p-ready .card-state-circle,
    body.device-surface .card.p-paused .card-state-circle,
    body.device-surface .card.p-offline .card-state-circle {
      width: 159px;
      height: 124px;
      padding: 14px 11px;
      gap: 7px;
    }

    body.device-surface .card.p-ready .card-state-icon,
    body.device-surface .card.p-paused .card-state-icon,
    body.device-surface .card.p-offline .card-state-icon {
      width: 37px;
      height: 37px;
    }

    body.device-surface .card-state-label {
      font-size: 11px;
    }

    body.device-surface .card-state-icon {
      width: 32px;
      height: 32px;
    }

    body.device-surface .card-pct-paused-num {
      font-size: 16px;
    }

    body.device-surface .card-pct-paused-sym {
      font-size: 11px;
    }

    body.device-surface .card-num {
      font-size: 92px;
    }

    body.device-surface .card-sym {
      font-size: 37px;
      margin-left: 2px;
      margin-top: 4px;
    }

  </style>
</head>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const isWindows = /Win/i.test(navigator.platform) || /Windows/i.test(navigator.userAgent);
      const screenRatio = window.screen.width / window.screen.height;
      const isAspectRatio32 = Math.abs(screenRatio - 1.5) < 0.05;
      const isHighDPI = window.devicePixelRatio >= 1.5;
      if (isWindows && isAspectRatio32 && isHighDPI) {
        document.body.classList.add('device-surface');
      }
    });

    const JOB_PLACEHOLDER = '--:--';

    const cloudBroker = 'm0722111.ala.eu-central-1.emqxsl.com';
    const cloudPort = 8084;
    const cloudUser = 'DatiX';
    const cloudPass = 'fdfkjy';
    const cloudTopic = 'my_printers/data';

    const clientId = 'web_dashboard_' + Math.random().toString(16).substr(2, 8);
    const mqtt = new Paho.MQTT.Client(cloudBroker, cloudPort, clientId);

    mqtt.onConnectionLost = () => { setTimeout(connectMQTT, 2000); };

    function formatTemp(value) {
      const temp = Number(value);
      if (!Number.isFinite(temp) || temp <= 0) return '--';
      return Math.round(temp) + '°';
    }

    function formatEstimated(p) {
      if (p.remSec > 0) {
        const d = new Date(Date.now() + p.remSec * 1000);
        return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
      }
      return JOB_PLACEHOLDER;
    }

    function getStatusText(p) {
      if (!p.online) return 'OFFLINE';
      if (p.state === 'READY') return 'STANDBY';
      return p.state;
    }

    function getContentMode(p) {
      if (!p.online || (p.online && (p.state === 'PRINTING' || p.state === 'READY'))) return 'print';
      if (p.state === 'PAUSED') return 'idle-paused';
      return 'idle-standby';
    }

    function setField(card, name, value) {
      const el = card.querySelector('[data-field="' + name + '"]');
      if (!el) return;
      el.textContent = value;
      if (name === 'remaining' || name === 'estimated' || name === 'layer') {
        el.classList.toggle('is-placeholder', value === JOB_PLACEHOLDER);
      }
    }

    function getFillProgress(p) {
      if (!p.online) return 0;
      if (p.state === 'PRINTING' || p.state === 'PAUSED') {
        return Math.min(100, Math.max(0, Number(p.progress) || 0));
      }
      return 0;
    }

    function updateCard(card, p) {
      const fillProgress = getFillProgress(p);
      card.style.setProperty('--progress-num', fillProgress);
      const railFill = card.querySelector('.card-rail-fill');
      if (railFill) railFill.classList.toggle('is-full', fillProgress >= 100);

      const jobActive = p.online && p.state === 'PRINTING';
      const progress = jobActive
        ? Math.min(100, Math.max(0, Number(p.progress) || 0))
        : (p.online && p.state === 'READY' ? 0 : '—');

      const remaining = jobActive ? (p.remaining || JOB_PLACEHOLDER) : JOB_PLACEHOLDER;
      const estimated = jobActive ? formatEstimated(p) : JOB_PLACEHOLDER;
      const layer = jobActive ? (p.layer || JOB_PLACEHOLDER) : JOB_PLACEHOLDER;

      const numEl = card.querySelector('[data-field="progress-num"]');
      const symEl = card.querySelector('.card-sym');
      const pausedNumEl = card.querySelector('[data-field="progress-paused"]');

      if (p.online && p.state === 'PAUSED' && pausedNumEl) {
        pausedNumEl.textContent = Math.min(100, Math.max(0, Number(p.progress) || 0));
      }

      if (!(p.online && (p.state === 'READY' || p.state === 'PAUSED'))) {
        const displayNum = p.online ? (jobActive ? progress : '—') : '—';
        if (numEl) numEl.textContent = displayNum;
        if (symEl) symEl.hidden = !p.online;
      }

      setField(card, 'remaining', remaining);
      setField(card, 'estimated', estimated);
      setField(card, 'layer', layer);
      setField(card, 'nozzle', formatTemp(p.nozzle));
      setField(card, 'bed', formatTemp(p.bed));

      const titleEl = card.querySelector('.card-title');
      if (titleEl) titleEl.textContent = card.querySelector('.printer-name').textContent;

      card.dataset.mode = getContentMode(p);
      card.dataset.jobActive = jobActive ? '1' : '0';

      const baseOrder = card.dataset.id === 'q2' ? 1 : (card.dataset.id === 'u1' ? 2 : 3);
      card.style.order = (p.online && p.state === 'PRINTING') ? baseOrder : (baseOrder + 3);
    }

    mqtt.onMessageArrived = (message) => {
      try {
        const data = JSON.parse(message.payloadString);
        Object.keys(data).forEach(id => {
          const p = data[id];
          const card = document.getElementById('card_' + id);
          if (!card) return;

          const stateClass = !p.online
            ? 'p-offline'
            : (p.state === 'PRINTING' ? 'p-printing' : (p.state === 'PAUSED' ? 'p-paused' : (p.state === 'READY' ? 'p-ready' : 'p-offline')));
          card.className = 'card ' + stateClass;

          updateCard(card, p);
        });
      } catch (e) {
        console.error(e);
      }
    };

    function connectMQTT() {
      mqtt.connect({
        useSSL: true,
        userName: cloudUser,
        password: cloudPass,
        onSuccess: () => { mqtt.subscribe(cloudTopic); },
        onFailure: () => { setTimeout(connectMQTT, 2000); }
      });
    }

    connectMQTT();
  </script>
</body>
