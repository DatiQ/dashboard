<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>3D Control Center (Private Cloud)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect x='2' y='2' width='9' height='9' fill='%2300d2ff' /%3E%3Crect x='13' y='2' width='9' height='9' fill='%234ade80' /%3E%3Crect x='2' y='13' width='9' height='9' fill='%23f0c028' /%3E%3Crect x='13' y='13' width='9' height='9' fill='%23ff3333' /%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>

  <style>
    body{background:#080a0f;color:#f0f0f0;font-family:'Roboto',sans-serif;margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;box-sizing:border-box;}
    .dashboard{width:100%;max-width:1100px;display:grid;grid-template-columns:repeat(3,1fr);gap:25px;align-items:stretch;}
    .card{background:rgba(22,26,35,0.8);border-radius:16px;padding:24px;border:1px solid rgba(255,255,255,0.05);position:relative;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,0.5);display:flex;flex-direction:column;}
    .card::before{content:'';position:absolute;top:0;left:0;width:100%;height:4px;background:var(--clr);}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;}
    .p-name{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;line-height:1;letter-spacing:1px;background:var(--clr);color:#14171f;padding:6px 12px;border-radius:8px;}
    .s-badge{font-size:11px;padding:4px 10px;border-radius:6px;background:rgba(255,255,255,0.05);text-transform:uppercase;font-weight:700;}
    .st-printing{color:#4ade80 !important; animation: blink 2.5s infinite;}
    .st-paused{color:#f0c028 !important; animation: blink 1.2s infinite;}
    .st-ready{color:#00d2ff !important;}
    .st-offline{color:#555 !important;}
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
    .bar-bg{background:rgba(255,255,255,0.05);height:8px;border-radius:4px;overflow:hidden;margin:10px 0 20px 0;}
    .bar-fill{height:100%;background:var(--clr);box-shadow:0 0 12px var(--clr);transition:width 1s cubic-bezier(0.4,0,0.2,1);}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
    .stat-v{font-family:'Rajdhani',sans-serif;font-size:18px;color:#fff;font-weight:700;} 
    .stat-l{font-size:10px;color:#555;text-transform:uppercase;font-weight:700;}
    .ready{text-align:center;padding:30px 0;color:#4ade80;font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;letter-spacing:2px;}
    @media (max-width: 900px) { body { align-items: flex-start; padding: 15px; } .dashboard { grid-template-columns: 1fr; gap: 15px; margin-top: 5px; } .card { padding: 20px; } .p-name { font-size: 20px; } }
  </style>
</head>
<body>

  <div class="dashboard">
    <div id="card_q2" class="card" style="--clr:#00d2ff;">
      <div class="header">
        <div class="p-name">Q2</div>
        <div id="state_q2" class="s-badge st-offline">CONNECTING...</div>
      </div>
      <div id="content_q2"></div>
    </div>

    <div id="card_u1" class="card" style="--clr:#f0c028;">
      <div class="header">
        <div class="p-name">U1</div>
        <div id="state_u1" class="s-badge st-offline">CONNECTING...</div>
      </div>
      <div id="content_u1"></div>
    </div>

    <div id="card_p1s" class="card" style="--clr:#4ade80;">
      <div class="header">
        <div class="p-name">P1S</div>
        <div id="state_p1s" class="s-badge st-offline">CONNECTING...</div>
      </div>
      <div id="content_p1s"></div>
    </div>
  </div>

  <script>
    const cloudBroker = 'm0722111.ala.eu-central-1.emqxsl.com';
    const cloudPort = 8084; 
    const cloudUser = 'DatiX';   
    const cloudPass = 'fdfkjy';  
    const cloudTopic = 'my_printers/data';

    const clientId = 'web_client_' + Math.random().toString(16).substr(2, 8);
    const mqtt = new Paho.MQTT.Client(cloudBroker, cloudPort, clientId);

    mqtt.onConnectionLost = (responseObject) => {
      console.log("Connection lost, reconnecting...");
      setTimeout(connectMQTT, 2000);
    };

    mqtt.onMessageArrived = (message) => {
      try {
        const data = JSON.parse(message.payloadString);
        
        Object.keys(data).forEach(id => {
          const p = data[id];
          const el = document.getElementById('state_' + id);
          if (!el) return;

          el.innerText = p.state;
          el.className = 's-badge ' + (p.state === 'PRINTING' ? 'st-printing' : (p.state === 'PAUSED' ? 'st-paused' : (p.state === 'READY' ? 'st-ready' : 'st-offline')));

          let html = '';
          if (p.online && p.isPrinting) {
            let fTime = '--:--';
            if (p.remSec > 0) {
              let d = new Date(Date.now() + p.remSec * 1000);
              fTime = d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
            }
            html = `<div class='progress-box'>
              <div style='display:flex;justify-content:space-between;font-family:Rajdhani;font-weight:700;font-size:18px;'><span style='color:#555'>PROGRESS</span><span>${p.progress}%</span></div>
              <div class='bar-bg'><div class='bar-fill' style='width:${p.progress}%'></div></div>
              <div class='stats'>
                <div class='stat-item'><span class='stat-l'>REM.</span><br><span class='stat-v'>${p.remaining}</span></div>
                <div class='stat-item'><span class='stat-l'>FINISH</span><br><span class='stat-v'>${fTime}</span></div>
                <div class='stat-item'><span class='stat-l'>LAYER</span><br><span class='stat-v'>${p.layer}</span></div>
              </div>
            </div>`;
          } else if (p.online) {
            html = '<div class="ready">SYSTEM READY</div>';
          } else {
            html = '<div style="color:#333;padding:30px 0;text-align:center;font-family:Rajdhani;font-weight:700;">CONNECTION LOST</div>';
          }
          
          document.getElementById('content_' + id).innerHTML = html;

          const baseOrder = id === 'q2' ? 1 : (id === 'u1' ? 2 : 3);
          document.getElementById('card_' + id).style.order = (p.online && p.isPrinting) ? baseOrder : (baseOrder + 3);
        });
      } catch (e) {
        console.error("Error parsing JSON data", e);
      }
    };

    function connectMQTT() {
      mqtt.connect({
        useSSL: true, 
        userName: cloudUser,
        password: cloudPass,
        onSuccess: () => {
          console.log("Connected to EMQX Cloud via WebSockets");
          mqtt.subscribe(cloudTopic);
        },
        onFailure: (err) => {
          console.log("Connect failed, retrying...", err);
          setTimeout(connectMQTT, 2000);
        }
      });
    }

    connectMQTT();
  </script>
</body>
</html>
