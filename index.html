<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DASHBOARD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect x='2' y='2' width='9' height='9' fill='%230ea5e9' /%3E%3Crect x='13' y='2' width='9' height='9' fill='%2322c55e' /%3E%3Crect x='2' y='13' width='9' height='9' fill='%23eab308' /%3E%3Crect x='13' y='13' width='9' height='9' fill='%2364748b' /%3E%3C/svg%3E">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>

  <style>
    @property --progress {
      syntax: '<percentage>';
      inherits: true;
      initial-value: 0%;
    }

    @property --progress-num {
      syntax: '<number>';
      inherits: true;
      initial-value: 0;
    }

    :root {
      --bg-color: #080a0f;
      --card-bg: #14171f;
      --card-border: #20232b; 
      --text-main: #d4dae6;
      --text-muted: #64748b;
      
      --clr-q2: #00d2ff;
      --clr-u1: #f0c028;
      --clr-p1s: #10b981;
      --clr-offline: #334155;

      --clr-q2-bg: rgba(0, 210, 255, 0.095);
      --clr-u1-bg: rgba(240, 192, 40, 0.095);
      --clr-p1s-bg: rgba(16, 185, 129, 0.095);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Rajdhani', sans-serif;
      font-weight: 500;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    .dashboard {
      width: 100%;
      max-width: 1050px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
    }

    .card {
      background-color: var(--card-bg);
      border: none;
      border-radius: 10px;
      padding: 18px 24px 24px;
      display: flex;
      flex-direction: column;
      min-height: 240px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2), 0 2px 4px -1px rgba(0, 0, 0, 0.1);
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, background-color 0.3s, --progress 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card:not(.p-printing):hover {
      background-color: #1c202b;
    }

    #card_q2 { --printer-clr: var(--clr-q2); --printer-bg-clr: var(--clr-q2-bg); }
    #card_u1 { --printer-clr: var(--clr-u1); --printer-bg-clr: var(--clr-u1-bg); }
    #card_p1s { --printer-clr: var(--clr-p1s); --printer-bg-clr: var(--clr-p1s-bg); }
    
    .card.p-offline { --status-clr: var(--clr-offline); }
    .card.p-printing, .card.p-ready, .card.p-paused { --status-clr: var(--printer-clr); }

    .card-header, #content_q2, #content_u1, #content_p1s {
      position: relative;
      z-index: 1;
    }

    #content_q2, #content_u1, #content_p1s {
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .printer-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--printer-clr, var(--text-main));
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .card.p-offline .printer-title {
      color: var(--text-muted);
    }

    .status-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
      background: rgba(0,0,0,0.28);
      color: var(--text-muted);
      border: none;
    }

    .status-dot {
      display: none;
    }

    .print-percentage {
      color: var(--text-main);
    }

    .print-percent-value {
      position: relative;
      display: inline-block;
      font-size: 90px;
      font-weight: 700;
      line-height: 0.97;
    }

    .print-percent-sign {
      position: absolute;
      top: 6px;
      left: 100%;
      font-size: 0.38em;
      font-weight: 700;
      line-height: 1;
    }

    .print-label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 0;
    }

    .print-body {
      display: grid;
      grid-template-columns: max-content minmax(0, 1fr);
      column-gap: 10px;
      flex-grow: 1;
      margin-top: 4px;
      align-items: stretch;
    }

    .print-left-block {
      display: flex;
      align-items: stretch;
      gap: 20px;
      padding-right: 4px;
    }

    .print-left-stack {
      display: flex;
      flex-direction: column;
      gap: 11px;
    }

    .print-layer-row {
      margin-top: 2px;
    }

    .print-progress-rail {
      width: 7px;
      flex-shrink: 0;
      align-self: stretch;
      display: flex;
      margin-left: 5px;
      margin-right: 0px;
    }

    .print-progress-track {
      flex: 1;
      min-height: 0;
      position: relative;
      padding: 1px;
      box-sizing: border-box;
      border-radius: 999px;
      background: #000;
    }

    .print-progress-fill {
      position: absolute;
      left: 1px;
      right: 1px;
      bottom: 1px;
      height: calc((100% - 2px) * var(--progress-num, 0) / 100);
      max-height: calc(100% - 2px);
      background: var(--printer-clr);
      border-radius: 999px;
    }

    .print-progress-fill.is-full {
      height: calc(100% - 2px);
    }

    .print-details {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 11px;
    }

    .print-detail-row {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0;
    }

    .print-percent-panel {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: space-between;
      align-self: stretch;
      min-height: 100%;
      gap: 0;
      margin-top: -9px;
      padding-left: 9px;
      box-sizing: border-box;
    }

    .print-percent-top {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .print-percent-panel .print-label {
      margin-top: -4px;
    }

    .print-percent-bottom {
      margin-top: auto;
      width: 100%;
      box-sizing: border-box;
    }

    .print-percent-divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
      margin-bottom: 10px;
    }

    .print-temps {
      display: flex;
      gap: 18px;
    }

    .print-temp-item {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0;
    }

    .print-temp-label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .print-temp-value {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-main);
      line-height: 1.15;
    }

    .idle-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-grow: 1;
      padding-bottom: 12px;
    }

    .idle-circle {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.2);
      border: 2px solid var(--status-clr);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      color: var(--status-clr);
    }

    .card.p-ready .idle-circle, .card.p-paused .idle-circle {
      animation: breathe 2.5s infinite ease-in-out;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); box-shadow: 0 0 4px rgba(var(--status-clr), 0.1); }
      50% { transform: scale(1.03); box-shadow: 0 0 16px rgba(var(--status-clr), 0.25); border-color: var(--status-clr); }
    }

    .idle-icon { width: 32px; height: 32px; fill: currentColor; }

    .idle-title {
      font-size: 18px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }
    .card.p-ready .idle-title, .card.p-paused .idle-title { color: var(--text-main); }
    .card.p-offline .idle-title { color: var(--text-muted); }

    .idle-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .metric-label {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }
    .metric-value { font-size: 18px; font-weight: 600; color: var(--text-main); }

    @media (min-width: 961px) {
      body { justify-content: center; }
    }

    @media (max-width: 960px) {
      .dashboard { grid-template-columns: 1fr; gap: 16px; }
      body { padding: 20px 16px; }
    }

    /* --- АДАПТИВНІ СТИЛІ ДЛЯ MICROSOFT SURFACE (+15%) --- */
    body.device-surface {
      padding: 46px 24px;
    }
    body.device-surface .dashboard {
      max-width: 1250px;
      gap: 36px;
    }
    body.device-surface .card {
      padding: 22px 28px 28px;
      min-height: 270px;
      border-radius: 11px;
    }
    body.device-surface .printer-title { font-size: 25px; }
    body.device-surface .status-wrapper { font-size: 16px; padding: 5px 14px; }
    body.device-surface .print-percent-panel { padding-left: 11px; }
    body.device-surface .print-percent-value { font-size: 104px; }
    body.device-surface .print-label { font-size: 14px; }
    body.device-surface .print-body { grid-template-columns: max-content minmax(0, 1fr); }
    body.device-surface .print-left-stack { gap: 13px; }
    body.device-surface .print-progress-rail { width: 8px; }
    body.device-surface .idle-circle { width: 80px; height: 80px; margin-bottom: 18px; }
    body.device-surface .idle-icon { width: 37px; height: 37px; }
    body.device-surface .idle-title { font-size: 21px; }
    body.device-surface .idle-subtitle { font-size: 16px; }
    body.device-surface .metric-label { font-size: 15px; }
    body.device-surface .metric-value { font-size: 21px; }
    body.device-surface .print-temp-value { font-size: 21px; }
    body.device-surface .print-temp-label { font-size: 14px; }
  </style>
</head>
<body>

  <div class="dashboard">
    <div id="card_q2" class="card p-offline">
      <div class="card-header">
        <div class="printer-title">QIDI Q2</div>
        <div class="status-wrapper"><div class="status-dot"></div><span id="state_q2">Offline</span></div>
      </div>
      <div id="content_q2"></div>
    </div>

    <div id="card_u1" class="card p-offline">
      <div class="card-header">
        <div class="printer-title">Snapmaker U1</div>
        <div class="status-wrapper"><div class="status-dot"></div><span id="state_u1">Offline</span></div>
      </div>
      <div id="content_u1"></div>
    </div>

    <div id="card_p1s" class="card p-offline">
      <div class="card-header">
        <div class="printer-title">Bambu Lab P1S</div>
        <div class="status-wrapper"><div class="status-dot"></div><span id="state_p1s">Offline</span></div>
      </div>
      <div id="content_p1s"></div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const isWindows = /Win/i.test(navigator.platform) || /Windows/i.test(navigator.userAgent);
      const screenRatio = window.screen.width / window.screen.height;
      const isAspectRatio32 = Math.abs(screenRatio - 1.5) < 0.05;
      const isHighDPI = window.devicePixelRatio >= 1.5;

      if (isWindows && isAspectRatio32 && isHighDPI) {
        document.body.classList.add('device-surface');
        console.log("[⚙️] Геометрія екрана визначена як 3:2 (Microsoft Surface). Стилі +15% активовано.");
      }
    });

    const cloudBroker = 'm0722111.ala.eu-central-1.emqxsl.com';
    const cloudPort = 8084; 
    const cloudUser = 'DatiX';   
    const cloudPass = 'fdfkjy';  
    const cloudTopic = 'my_printers/data';

    const clientId = 'web_dashboard_' + Math.random().toString(16).substr(2, 8);
    const mqtt = new Paho.MQTT.Client(cloudBroker, cloudPort, clientId);

    mqtt.onConnectionLost = () => { setTimeout(connectMQTT, 2000); };

    function formatTemp(value) {
      const temp = Number(value);
      if (!Number.isFinite(temp) || temp <= 0) return '--';
      return Math.round(temp) + '°';
    }

    mqtt.onMessageArrived = (message) => {
      try {
        const data = JSON.parse(message.payloadString);
        
        Object.keys(data).forEach(id => {
          const p = data[id];
          const card = document.getElementById('card_' + id);
          const stateEl = document.getElementById('state_' + id);
          if (!card || !stateEl) return;

          // ПІДМІНА НА ВЕЛИКІ ЛІТЕРИ ВЖЕ НА СТОРІНІ БРАУЗЕРА
          if (p.state === 'READY') {
            stateEl.innerText = 'STANDBY';
          } else {
            stateEl.innerText = p.state;
          }

          card.className = 'card ' + (p.state === 'PRINTING' ? 'p-printing' : (p.state === 'PAUSED' ? 'p-paused' : (p.state === 'READY' ? 'p-ready' : 'p-offline')));

          let html = '';
          if (p.online && p.state === 'PRINTING') {
            let fTime = '--:--';
            if (p.remSec > 0) {
              let d = new Date(Date.now() + p.remSec * 1000);
              fTime = d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
            }
            
            const progress = Math.min(100, Math.max(0, Number(p.progress) || 0));
            card.style.setProperty('--progress', progress + '%');
            card.style.setProperty('--progress-num', progress);
            html = `
              <div class="print-body">
                <div class="print-left-block">
                  <div class="print-left-stack">
                    <div class="print-details">
                      <div class="print-detail-row"><div class="metric-label">Remaining</div><div class="metric-value">${p.remaining}</div></div>
                      <div class="print-detail-row"><div class="metric-label">Estimated</div><div class="metric-value">${fTime}</div></div>
                    </div>
                    <div class="print-detail-row print-layer-row"><div class="metric-label">Layer</div><div class="metric-value">${p.layer}</div></div>
                  </div>
                  <div class="print-progress-rail" style="--progress: ${progress}%; --progress-num: ${progress}" aria-hidden="true">
                    <div class="print-progress-track">
                      <div class="print-progress-fill${progress >= 100 ? ' is-full' : ''}"></div>
                    </div>
                  </div>
                </div>
                <div class="print-percent-panel">
                  <div class="print-percent-top">
                    <div class="print-percentage"><span class="print-percent-value">${progress}<span class="print-percent-sign">%</span></span></div>
                    <div class="print-label">Progress</div>
                  </div>
                  <div class="print-percent-bottom">
                    <div class="print-percent-divider"></div>
                    <div class="print-temps">
                      <div class="print-temp-item">
                        <div class="print-temp-label">Nozzle</div>
                        <div class="print-temp-value">${formatTemp(p.nozzle)}</div>
                      </div>
                      <div class="print-temp-item">
                        <div class="print-temp-label">Bed</div>
                        <div class="print-temp-value">${formatTemp(p.bed)}</div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>`;
          } else {
            card.style.setProperty('--progress', '0%');
            card.style.setProperty('--progress-num', 0);
            if (!p.online) {
              html = `
                <div class="idle-box">
                  <div class="idle-circle">
                    <svg class="idle-icon" viewBox="0 0 24 24">
                      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                    </svg>
                  </div>
                  <div class="idle-title">No Connection</div>
                  <div class="idle-subtitle">Check power or network</div>
                </div>`;
            } else if (p.state === 'PAUSED') {
              html = `
                <div class="idle-box">
                  <div class="idle-circle">
                    <svg class="idle-icon" viewBox="0 0 24 24">
                      <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                    </svg>
                  </div>
                  <div class="idle-title">Print Paused</div>
                  <div class="idle-subtitle">Waiting to resume</div>
                </div>`;
            } else {
              html = `
                <div class="idle-box">
                  <div class="idle-circle">
                    <svg class="idle-icon" viewBox="0 0 24 24">
                      <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                    </svg>
                  </div>
                  <div class="idle-title">Standby Mode</div>
                  <div class="idle-subtitle">Ready to print</div>
                </div>`;
            }
          }
          
          document.getElementById('content_' + id).innerHTML = html;

          const rail = card.querySelector('.print-progress-rail');
          if (rail) {
            const pct = Math.min(100, Math.max(0, Number(p.progress) || 0));
            rail.style.setProperty('--progress', pct + '%');
            rail.style.setProperty('--progress-num', pct);
          }
          
          const baseOrder = id === 'q2' ? 1 : (id === 'u1' ? 2 : 3);
          card.style.order = (p.online && p.state === 'PRINTING') ? baseOrder : (baseOrder + 3);
        });
      } catch (e) { console.error(e); }
    };

    function connectMQTT() {
      mqtt.connect({
        useSSL: true, 
        userName: cloudUser,
        password: cloudPass,
        onSuccess: () => { mqtt.subscribe(cloudTopic); },
        onFailure: () => { setTimeout(connectMQTT, 2000); }
      });
    }

    connectMQTT();
  </script>
</body>
</html>
