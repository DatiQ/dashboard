<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Printer Pool Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect x='2' y='2' width='9' height='9' fill='%2300d2ff' /%3E%3Crect x='13' y='2' width='9' height='9' fill='%234ade80' /%3E%3Crect x='2' y='13' width='9' height='9' fill='%23f0c028' /%3E%3Crect x='13' y='13' width='9' height='9' fill='%23ff3333' /%3E%3C/svg%3E">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>

  <style>
    :root {
      --bg-color: #080a0f;
      --card-bg: #14171f;
      --card-border: #20232b;
      --text-main: #f8fafc;
      --text-muted: #64748b;
      
      --clr-q2: #00d2ff;
      --clr-u1: #f0c028;  
      --clr-p1s: #10b981;
      --clr-offline: #334155;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Rajdhani', sans-serif;
      font-weight: 500;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    header {
      width: 100%;
      max-width: 1140px;
      margin-bottom: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--card-border);
      padding-bottom: 16px;
    }

    header h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .system-time {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .dashboard {
      width: 100%;
      max-width: 1140px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      min-height: 290px; 
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2), 0 2px 4px -1px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s, border-color 0.2s;
    }

    .card:hover {
      border-color: #334155;
    }

    #card_q2 { --printer-clr: var(--clr-q2); }
    #card_u1 { --printer-clr: var(--clr-u1); }
    #card_p1s { --printer-clr: var(--clr-p1s); }
    
    .card.p-offline { --status-clr: var(--clr-offline); }
    .card.p-printing, .card.p-ready, .card.p-paused { --status-clr: var(--printer-clr); }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .printer-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-main);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      background: rgba(0,0,0,0.2);
      color: var(--status-clr);
      border: 1px solid rgba(255,255,255,0.03);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: var(--status-clr);
      box-shadow: 0 0 8px var(--status-clr);
    }

    .progress-box {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 24px;
      position: relative;
    }

    .circle-svg { width: 130px; height: 130px; transform: rotate(-90deg); }
    .circle-bg { fill: none; stroke: rgba(255, 255, 255, 0.02); stroke-width: 8; }
    
    .circle-fill {
      fill: none;
      stroke: var(--printer-clr);
      stroke-width: 8;
      stroke-linecap: round; /* Додає закруглення країв лінії */
      stroke-dasharray: 345; 
      stroke-dashoffset: 345;
      transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .progress-val {
      position: absolute;
      font-size: 32px;
      font-weight: 700;
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 0.9;
    }
    .progress-val span {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-top: 4px;
    }

    .idle-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-grow: 1;
      padding-bottom: 12px;
    }

    .idle-circle {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.2);
      border: 2px solid var(--status-clr);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      color: var(--status-clr);
    }

    .card.p-ready .idle-circle {
      animation: breathe 2.5s infinite ease-in-out;
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.02);
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); box-shadow: 0 0 4px rgba(var(--status-clr), 0.1); }
      50% { transform: scale(1.03); box-shadow: 0 0 16px rgba(var(--status-clr), 0.25); border-color: var(--status-clr); }
    }

    .idle-icon {
      width: 32px;
      height: 32px;
      fill: currentColor;
    }

    .idle-title {
      font-size: 18px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }
    .card.p-ready .idle-title { color: var(--text-main); }
    .card.p-offline .idle-title { color: var(--text-muted); }

    .idle-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: auto;
      border-top: 1px solid rgba(255,255,255,0.05);
      padding-top: 16px;
    }

    .metric-item {
      display: flex;
      flex-direction: column;
    }

    .metric-label {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }

    .metric-value {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-main);
    }

    /* --- Зміни для ПК (від 961px) --- */
    @media (min-width: 961px) {
      body {
        justify-content: center; /* Ідеальне центрування всієї панелі по вертикалі */
      }
    }

    @media (max-width: 960px) {
      .dashboard { grid-template-columns: 1fr; gap: 16px; }
      body { padding: 20px 16px; }
      header h1 { font-size: 22px; }
    }
  </style>
</head>
<body>

  <div class="dashboard">
    <div id="card_q2" class="card p-offline">
      <div class="card-header">
        <div class="printer-title">QIDI Q2</div>
        <div class="status-wrapper"><div class="status-dot"></div><span id="state_q2">Offline</span></div>
      </div>
      <div id="content_q2"></div>
    </div>

    <div id="card_u1" class="card p-offline">
      <div class="card-header">
        <div class="printer-title">UNIMAKER U1</div>
        <div class="status-wrapper"><div class="status-dot"></div><span id="state_u1">Offline</span></div>
      </div>
      <div id="content_u1"></div>
    </div>

    <div id="card_p1s" class="card p-offline">
      <div class="card-header">
        <div class="printer-title">Bambu Lab P1S</div>
        <div class="status-wrapper"><div class="status-dot"></div><span id="state_p1s">Offline</span></div>
      </div>
      <div id="content_p1s"></div>
    </div>
  </div>

  <script>
    const cloudBroker = 'm0722111.ala.eu-central-1.emqxsl.com';
    const cloudPort = 8084; 
    const cloudUser = 'DatiX';   
    const cloudPass = 'fdfkjy';  
    const cloudTopic = 'my_printers/data';

    const clientId = 'web_dashboard_' + Math.random().toString(16).substr(2, 8);
    const mqtt = new Paho.MQTT.Client(cloudBroker, cloudPort, clientId);

    setInterval(() => {
      const now = new Date();
      const el = document.getElementById('live_time');
      if (el) el.innerText = 'Updated: ' + now.toLocaleTimeString('en-US', { hour12: false });
    }, 1000);

    mqtt.onConnectionLost = () => { setTimeout(connectMQTT, 2000); };

    mqtt.onMessageArrived = (message) => {
      try {
        const data = JSON.parse(message.payloadString);
        
        Object.keys(data).forEach(id => {
          const p = data[id];
          const card = document.getElementById('card_' + id);
          const stateEl = document.getElementById('state_' + id);
          if (!card || !stateEl) return;

          stateEl.innerText = p.state;
          card.className = 'card ' + (p.state === 'PRINTING' ? 'p-printing' : (p.state === 'PAUSED' ? 'p-paused' : (p.state === 'READY' ? 'p-ready' : 'p-offline')));

          let html = '';
          if (p.online && p.isPrinting) {
            let fTime = '--:--';
            if (p.remSec > 0) {
              let d = new Date(Date.now() + p.remSec * 1000);
              fTime = d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
            }
            
            const strokeDashoffset = 345 - (345 * p.progress) / 100;

            html = `
              <div class="progress-box">
                <svg class="circle-svg">
                  <circle class="circle-bg" cx="65" cy="65" r="55"></circle>
                  <circle class="circle-fill" cx="65" cy="65" r="55" style="stroke-dashoffset: ${strokeDashoffset}"></circle>
                </svg>
                <div class="progress-val">${p.progress}%<span>progress</span></div>
              </div>
              <div class="metrics-grid">
                <div class="metric-item"><div class="metric-label">Remaining</div><div class="metric-value">${p.remaining}</div></div>
                <div class="metric-item"><div class="metric-label">Estimated</div><div class="metric-value">${fTime}</div></div>
                <div class="metric-item"><div class="metric-label">Layer</div><div class="metric-value">${p.layer}</div></div>
              </div>`;
          } else if (p.online) {
            html = `
              <div class="idle-box">
                <div class="idle-circle">
                  <svg class="idle-icon" viewBox="0 0 24 24">
                    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                  </svg>
                </div>
                <div class="idle-title">Standby Mode</div>
                <div class="idle-subtitle">Ready to print</div>
              </div>`;
          } else {
            html = `
              <div class="idle-box">
                <div class="idle-circle">
                  <svg class="idle-icon" viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                  </svg>
                </div>
                <div class="idle-title">No Connection</div>
                <div class="idle-subtitle">Check power or network</div>
              </div>`;
          }
          
          document.getElementById('content_' + id).innerHTML = html;
          
          const baseOrder = id === 'q2' ? 1 : (id === 'u1' ? 2 : 3);
          card.style.order = (p.online && p.isPrinting) ? baseOrder : (baseOrder + 3);
        });
      } catch (e) { console.error(e); }
    };

    function connectMQTT() {
      mqtt.connect({
        useSSL: true, 
        userName: cloudUser,
        password: cloudPass,
        onSuccess: () => { mqtt.subscribe(cloudTopic); },
        onFailure: () => { setTimeout(connectMQTT, 2000); }
      });
    }

    connectMQTT();
  </script>
</body>
</html>
